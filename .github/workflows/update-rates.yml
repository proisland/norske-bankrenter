name: Update bank rates

on:
  schedule:
    # Kjører hver mandag kl. 07:00 UTC (08:00 Oslo vintertid)
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch rates via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-rates.js

      - name: Commit updated rates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/rates.json; then
            echo "Ingen endringer i renter."
            exit 0
          fi
          git add data/rates.json
          git commit -m "chore: oppdater bankrenter ($(date -u +%Y-%m-%d))"
          git push
